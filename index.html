<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platforma Quizowa</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="container">
        
        <!-- EKRAN WYBORU KATEGORII -->
        <div id="categories-card" class="card">
            <div class="header">
                <h1>Wybierz kategorię testu</h1>
            </div>
            
            <div class="settings-container">
                <label for="question-count">Ilość pytań do wylosowania:</label>
                <select id="question-count" class="custom-select">
                    <option value="all">Wszystkie dostępne</option>
                    <option value="2">2</option>
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>

            <div id="categories-list" class="categories-grid">
                <!-- Kategorie z JS -->
            </div>
        </div>

        <!-- EKRAN QUIZU -->
        <div id="quiz-card" class="card hidden">
            <div class="header">
                <h1 id="quiz-title">Quiz</h1>
                <div id="progress">Pytanie 1 z ...</div>
            </div>
            
            <div id="question-container">
                <h2 id="question-text">Ładowanie pytania...</h2>
                <img id="question-image" src="" alt="Ilustracja do pytania" class="hidden">
                <p class="instruction">Możesz zaznaczyć więcej niż jedną odpowiedź.</p>
                <div id="options-list" class="options-grid"></div>
            </div>

            <div class="confirm-container">
                <button id="confirm-btn" class="btn-confirm">Zatwierdź odpowiedzi</button>
                <label class="skip-toggle"><input type="checkbox" id="skip-confirmed"> Pomijaj zatwierdzone</label>
            </div>

            <div class="footer">
                <button id="prev-btn" disabled>Poprzednie</button>
                <button id="back-to-results" class="btn-secondary hidden">Podsumowanie</button>
                <button id="submit-btn" class="btn-success" disabled>Zatwierdź test</button>
                <button id="next-btn">Następne</button>
            </div>
        </div>

        <!-- EKRAN WYNIKÓW -->
        <div id="result-card" class="card hidden">
            <h1>Koniec Quizu!</h1>
            <p class="score-text">Twój wynik to:</p>
            <div id="final-score">0 / 0</div>
            <div class="footer result-footer">
                <button id="review-btn">Przejrzyj pytania</button>
                <button id="restart-btn">Rozwiąż ponownie</button>
                <button id="home-btn" class="btn-secondary">Wróć do menu</button>
            </div>
        </div>
        
    </div>
    <script src="script.js?v=2"></script>
</body>
</html>
